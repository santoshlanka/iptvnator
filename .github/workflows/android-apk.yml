name: Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack and install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build Angular PWA
        run: pnpm run build:frontend:pwa

      - name: Install Capacitor tooling (optional)
        run: |
          pnpm add -D @capacitor/cli @capacitor/android || echo "Capacitor already present or not needed"
          npx cap sync android || echo "cap sync android failed (ensure Capacitor + android platform are initialized)"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build release APK
        run: |
          if [ -d "android" ]; then
            cd android
            ./gradlew assembleRelease
          else
            echo "Android project directory ./android not found. Initialize Capacitor Android project first."
            exit 1
          fi

      - name: Decode signing keystore
        if: success()
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_B64}" ]; then
            echo "ANDROID_KEYSTORE_B64 secret is not set. Configure signing secrets in the repository settings."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/iptvnator-release.keystore

      - name: Sign APK
        if: success()
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_ALIAS_PASSWORD}" ]; then
            echo "One or more Android signing secrets are not set (ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_ALIAS_PASSWORD)."
            exit 1
          fi
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -n 1)
          if [ ! -f "$APK" ]; then
            echo "No APK found to sign."
            exit 1
          fi
          APKSIGNER=$(ls /usr/local/lib/android/sdk/build-tools/*/apksigner | head -n 1)
          if [ ! -x "$APKSIGNER" ]; then
            echo "apksigner not found in expected build-tools path."
            exit 1
          fi
          "$APKSIGNER" sign \
            --ks android/iptvnator-release.keystore \
            --ks-pass pass:${ANDROID_KEYSTORE_PASSWORD} \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass pass:${ANDROID_KEY_ALIAS_PASSWORD} \
            "$APK"

      - name: Upload signed APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iptvnator-android-signed
          path: android/app/build/outputs/apk/release/*.apk
